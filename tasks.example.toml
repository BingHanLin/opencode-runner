# Copy this to tasks.toml and edit. Each [[task]] block defines one scheduled task.
#
# Schedule formats (`schedule`):
#   cron:<Quartz cron expression>   NOT the traditional Unix 5-field syntax! This is
#                                   Quartz 6-field: second minute hour day-of-month
#                                   month day-of-week  (optional 7th field: year).
#                                   day-of-month and day-of-week cannot both be
#                                   specific; set the unused one to `?`.
#                                   Examples:
#                                     "cron:0 0 9 ? * MON-FRI"   weekdays at 09:00:00
#                                     "cron:0 */15 * ? * *"      every 15 minutes
#                                     "cron:0 0 0 1 * ?"         midnight on the 1st
#   once:<RFC3339 timestamp>        e.g. "once:2026-05-28T09:00:00Z"
#   manual                          fires only via the GUI's "Run now"

[[task]]
id = "daily-codereview"
name = "Daily code review"
schedule = "cron:0 0 9 ? * MON-FRI"
working_dir = "D:/projects/foo"
# model = "anthropic/claude-sonnet-4-6"   # blank → opencode's default (uses your opencode config)
prompt = """
Review `git diff HEAD~1` in the working directory,
identify potential issues, and list suggested fixes as bullet points.
"""
dangerously_skip_permissions = true
enabled = true

[[task]]
id = "test-once"
name = "One-shot test task"
schedule = "manual"
working_dir = "D:/shonCloud/opencdoe_orchestrator"
prompt = "Hello — please reply with a single sentence to confirm you can run."
enabled = true
